scanner:
  name: "端口扫描仪"
  version: "1.0.0"
  description: "合规内网端口扫描工具"

scan:
  default_threads: 200
  max_threads: 500
  min_threads: 50
  timeout: 1.5
  retry_count: 1
  retry_delay: 0.2
  batch_size: 1000

bandwidth:
  enabled: true
  threshold_percent: 30
  check_interval: 1
  reduce_ratio: 0.5

compliance:
  allowed_networks:
    - "127.0.0.1/8"
    - "192.168.0.0/16"
  strict_mode: true
  block_public_ip: true
  log_violation: true

services:
  known_ports:
    21: "FTP"
    22: "SSH"
    23: "Telnet"
    25: "SMTP"
    53: "DNS"
    80: "HTTP"
    110: "POP3"
    143: "IMAP"
    443: "HTTPS"
    445: "SMB"
    993: "IMAPS"
    995: "POP3S"
    1433: "MSSQL"
    1521: "Oracle"
    3306: "MySQL"
    3389: "RDP"
    5432: "PostgreSQL"
    5900: "VNC"
    6379: "Redis"
    8080: "HTTP-Alt"
    8443: "HTTPS-Alt"
    27017: "MongoDB"

risk:
  high_risk_ports:
    - 21
    - 22
    - 23
    - 3389
    - 3306
    - 5432
    - 1433
    - 1521
    - 6379
    - 27017
  medium_risk_ports:
    - 80
    - 443
    - 8080
    - 8443
    - 445
  low_risk_ports: []

output:
  default_format: "txt"
  supported_formats:
    - "txt"
    - "csv"
    - "json"
  include_timestamp: true
  include_signature: true
  output_dir: "./output"

audit:
  enabled: true
  log_dir: "./logs"
  signature_algorithm: "sha256"
  include_operator: true

logging:
  level: "INFO"
  format: "%(asctime)s - %(levelname)s - %(message)s"
  file: "./logs/scanner.log"
  console: true

performance:
  history_file: "./data/performance_history.json"
  baseline_enabled: true
  alert_threshold_percent: 50

sla:
  enabled: true
  report_dir: "./reports"
  target_time_per_port: 0.015
